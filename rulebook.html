<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rulebook - RUPANTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animation.css">
</head>
<body>
  <header id="header"></header>
  
  <main>
    <div class="container" style="padding-top:2rem;max-width:900px;">
      <h1 class="text-center text-amber mb-2">Rulebook</h1>
      <p class="text-center text-muted bengali mb-3">নিয়মাবলী</p>
      
      <!-- Search -->
      <div class="glass-panel mb-3">
        <input type="text" id="ruleSearch" placeholder="Search rules..." 
          style="width:100%;padding:0.75rem 1rem;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.1);background:var(--navy);color:var(--ivory);"
          oninput="RulesUI.search(this.value)">
      </div>
      
      <!-- Rules Sections -->
      <div id="rulesContainer"></div>
      
      <!-- Quick Reference -->
      <div class="glass-panel mt-3">
        <h3 class="text-emerald mb-2">Quick Reference</h3>
        <table style="width:100%;border-collapse:collapse;font-size:0.9rem;">
          <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
            <td style="padding:0.5rem;color:var(--muted);">Single transform</td>
            <td style="padding:0.5rem;text-align:right;color:var(--amber);">1 point</td>
          </tr>
          <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
            <td style="padding:0.5rem;color:var(--muted);">2-chain</td>
            <td style="padding:0.5rem;text-align:right;color:var(--amber);">1 point</td>
          </tr>
          <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
            <td style="padding:0.5rem;color:var(--muted);">3-chain</td>
            <td style="padding:0.5rem;text-align:right;color:var(--amber);">3 points</td>
          </tr>
          <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
            <td style="padding:0.5rem;color:var(--muted);">4-chain</td>
            <td style="padding:0.5rem;text-align:right;color:var(--amber);">6 points</td>
          </tr>
          <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
            <td style="padding:0.5rem;color:var(--muted);">5-chain</td>
            <td style="padding:0.5rem;text-align:right;color:var(--amber);">10 points</td>
          </tr>
          <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
            <td style="padding:0.5rem;color:var(--muted);">Pure chain bonus</td>
            <td style="padding:0.5rem;text-align:right;color:var(--gold);">2x multiplier</td>
          </tr>
          <tr>
            <td style="padding:0.5rem;color:var(--muted);">Win score</td>
            <td style="padding:0.5rem;text-align:right;color:var(--success);">30 points</td>
          </tr>
        </table>
      </div>
    </div>
  </main>
  
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
const RulesUI = {
  sections: [],
  
  async init() {
    try {
      const res = await fetch('data/rules.json');
      const json = await res.json();
      this.sections = json.sections;
      this.render(this.sections);
    } catch (e) {
      console.error('Failed to load rules:', e);
    }
  },
  
  render(sections) {
    const container = document.getElementById('rulesContainer');
    if (!container) return;
    
    container.innerHTML = sections.map((s, i) => `
      <details class="glass-panel mb-2" ${i === 0 ? 'open' : ''}>
        <summary style="cursor:pointer;padding:1rem;font-weight:700;color:var(--amber);list-style:none;display:flex;justify-content:space-between;align-items:center;">
          <span>${s.title}</span>
          <span class="bengali" style="color:var(--muted);font-weight:400;">${s.titleBn}</span>
        </summary>
        <div style="padding:0 1rem 1rem;color:var(--ivory);line-height:1.7;">
          <p>${s.content}</p>
          <p class="bengali" style="color:var(--muted);margin-top:0.5rem;">${s.contentBn}</p>
        </div>
      </details>
    `).join('');
  },
  
  search(query) {
    const q = query.toLowerCase();
    const filtered = this.sections.filter(s => 
      s.title.toLowerCase().includes(q) || 
      s.content.toLowerCase().includes(q) ||
      s.titleBn.includes(q) ||
      s.contentBn.includes(q)
    );
    this.render(filtered);
  }
};

document.addEventListener('DOMContentLoaded', () => RulesUI.init());
  </script>
</body>
</html>
