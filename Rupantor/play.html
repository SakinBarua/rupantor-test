<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUPANTOR - খেলুন | Play</title>
  <meta name="description" content="RUPANTOR card game - Everything Transforms">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Serif+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/gameplay.css">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F1419">
  
  <style>
    /* Inline critical styles for play.html */
    .game-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
      overflow: hidden;
    }
    
    .game-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      background: var(--slate);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    
    .game-stats {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 60px;
    }
    
    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
    }
    
    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ivory);
    }
    
    .turn-indicator {
      padding: 0.3rem 0.8rem;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.8rem;
    }
    
    .turn-indicator.player {
      background: var(--terracotta);
      animation: pulse 2s ease infinite;
    }
    
    .turn-indicator.ai {
      background: var(--teal);
    }
    
    .game-board {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      overflow: hidden;
    }
    
    .play-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      padding: 1rem;
    }
    
    .deck-zone, .world-zone, .history-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    
    .deck-zone {
      cursor: pointer;
    }
    
    .history-pile {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
    }
    
    .history-card {
      position: absolute;
      transition: all 0.2s ease;
    }
    
    .player-hand-container {
      height: 160px;
      position: relative;
      background: var(--slate);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    
    .player-hand {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    .mission-bars {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: var(--navy);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    
    .mission-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
    }
    
    .mission-progress {
      flex: 1;
      height: 6px;
      background: var(--slate);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .mission-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--emerald), var(--success));
      transition: width 0.3s ease;
    }
    
    @media (max-width: 600px) {
      .play-area {
        gap: 1rem;
        flex-wrap: wrap;
      }
      
      .player-hand-container {
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <!-- Header (loaded via fetch) -->
  <header id="header"></header>
  
  <!-- Game Container -->
  <div class="game-container">
    <!-- Top Bar -->
    <div class="game-top-bar">
      <div class="game-stats">
        <div class="stat-item">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">00:00</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Moves</span>
          <span class="stat-value" id="moves">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Your Score</span>
          <span class="stat-value score" id="player-score">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">AI Score</span>
          <span class="stat-value score" id="ai-score">0</span>
        </div>
      </div>
      
      <div class="turn-indicator player" id="turn-indicator">Your Turn</div>
      
      <div class="game-actions">
        <button class="btn-secondary" id="btn-undo" title="Undo (Ctrl+Z)">↩ Undo</button>
        <button class="btn-secondary" id="btn-hint" title="Hint (H)">💡 Hint</button>
        <button class="btn-secondary" id="btn-pause" title="Pause (P)">⏸ Pause</button>
        <button class="btn-amber" id="btn-new">🔄 New</button>
      </div>
    </div>
    
    <!-- Game Board -->
    <div class="game-board">
      <!-- Play Area -->
      <div class="play-area">
        <!-- Deck -->
        <div class="deck-zone" id="deck-zone" title="Click to draw">
          <div class="card-back" id="deck-card"></div>
          <span class="deck-count" id="deck-count">0 cards</span>
        </div>
        
        <!-- World State -->
        <div class="world-zone">
          <span class="world-state-label">বিশ্ব অবস্থা (World State)</span>
          <div id="world-state-container"></div>
        </div>
        
        <!-- History Pile -->
        <div class="history-zone">
          <div class="history-pile" id="history-pile"></div>
          <span class="history-label" id="history-label">ইতিহাস (0)</span>
        </div>
      </div>
    </div>
    
    <!-- Player Hand -->
    <div class="player-hand-container">
      <div class="player-hand" id="player-hand"></div>
    </div>
    
    <!-- Mission Bars -->
    <div class="mission-bars">
      <div class="mission-info">
        <span class="mission-icon">🎯</span>
        <span class="mission-text" id="player-mission-text">Your Mission</span>
      </div>
      <div class="mission-progress">
        <div class="mission-progress-bar" id="player-mission-bar" style="width: 0%"></div>
      </div>
      <div class="mission-info" style="justify-content: flex-end;">
        <span class="mission-text" id="ai-mission-text">AI Mission</span>
        <span class="mission-icon">🤖</span>
      </div>
    </div>
  </div>
  
  <!-- Modals -->
  <!-- Pause Modal -->
  <div class="modal-overlay" id="pause-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Game Paused</h2>
        <button class="modal-close" data-close="pause-modal">×</button>
      </div>
      <div class="modal-body">
        <p>Take your time. The game will wait.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="RupantorUI.closeModal('pause-modal')">Resume</button>
      </div>
    </div>
  </div>
  
  <!-- Game Over Modal -->
  <div class="modal-overlay" id="gameover-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="gameover-title">Game Over</h2>
        <button class="modal-close" data-close="gameover-modal">×</button>
      </div>
      <div class="modal-body" id="gameover-body">
        <!-- Stats will be inserted here -->
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="RupantorUI.closeModal('gameover-modal')">Close</button>
        <button class="btn-primary" onclick="startNewGame()">Play Again</button>
      </div>
    </div>
  </div>
  
  <!-- Card Detail Modal -->
  <div class="modal-overlay" id="card-detail-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Card Details</h2>
        <button class="modal-close" data-close="card-detail-modal">×</button>
      </div>
      <div class="modal-body" id="card-detail-body">
        <!-- Card will be inserted here -->
      </div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="RupantorUI.closeModal('card-detail-modal')">Close</button>
      </div>
    </div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>
  
  <!-- Confetti Container -->
  <div class="confetti-container" id="confetti-container"></div>
  
  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // ============================================
    // RUPANTOR - Complete Game Engine (Single File)
    // ============================================
    'use strict';
    
    // Game Constants
    const MAX_HAND = 7;
    const WIN_SCORE = 30;
    const MAX_CHAIN = 5;
    const MAX_UNDO = 20;
    
    // Category Icons
    const CATEGORY_ICONS = {
      'Nature': '🌿', 'Weather': '☁️', 'Energy': '☀️', 'Water': '💧',
      'Earth': '⛰️', 'Plants': '🌱', 'Animals': '🦋', 'Objects': '🌂',
      'Reaction': '↻', 'Mission': '🎯', 'World': '🌍', 'Special': '✦'
    };
    
    // Chain Points
    const CHAIN_POINTS = { 1: 1, 2: 1, 3: 3, 4: 6, 5: 10 };
    
    // Game State
    let GS = {
      deck: [],
      history: [],
      worldState: null,
      players: [],
      current: 0,
      turn: 1,
      moves: 0,
      phase: 'playing',
      startTime: 0,
      paused: false,
      pauseTime: 0,
      undoStack: [],
      timerInt: null
    };
    
    // Utility Functions
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);
    
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    
    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    
    // Card validation
    function canPlay(card, ws) {
      if (!card || !ws || card.isReact) return false;
      if (card.c === 'Special') {
        if (ws.tp && ws.tp.includes('Special')) return true;
        if ([85,89,90,91].includes(card.id)) return true;
      }
      if (ws.tp && ws.tp.includes(card.c)) return true;
      if (card.isWorld && ws.tp && ws.tp.includes('World')) return true;
      return false;
    }
    
    // Safe Draw
    function safeDraw(playerIdx) {
      const p = GS.players[playerIdx];
      if (p.hand.length >= MAX_HAND) return null;
      
      if (GS.deck.length === 0) {
        if (GS.history.length > 0) {
          GS.deck = shuffle(GS.history.slice());
          GS.history = [];
          renderDeck();
          renderHistory();
        } else {
          return null;
        }
      }
      
      return GS.deck.pop();
    }
    
    // Create card element
    function createCardEl(card, size='normal') {
      if (!card) return null;
      const icon = CATEGORY_ICONS[card.c] || '❓';
      const div = document.createElement('div');
      div.className = `card cat-${card.c} ${size === 'small' ? 'card-sm' : ''}`;
      div.dataset.cardId = card.id;
      div.innerHTML = `
        <div class="card-inner">
          <div class="card-banner">
            <span class="card-number">#${String(card.id).padStart(3,'0')}</span>
            <span class="card-banner-icon">${icon}</span>
          </div>
          <div class="card-illustration">${icon}</div>
          <div class="card-name">${card.n}</div>
          ${card.a ? `<div class="card-ability"><span class="card-ability-title">◆ Ability</span>${card.a}</div>` : ''}
          ${card.f ? `<div class="card-flavor">"${card.f}"</div>` : ''}
          <div class="card-footer">${card.c.toUpperCase()}</div>
        </div>
      `;
      return div;
    }
    
    function createCardBack() {
      const div = document.createElement('div');
      div.className = 'card-back';
      return div;
    }
    
    // Render functions
    function renderDeck() {
      $('#deck-count').textContent = `${GS.deck.length} cards`;
    }
    
    function renderWorldState() {
      const container = $('#world-state-container');
      container.innerHTML = '';
      if (GS.worldState) {
        const cardEl = createCardEl(GS.worldState, 'normal');
        cardEl.classList.add('world-state-card');
        container.appendChild(cardEl);
      }
    }
    
    function renderHistory() {
      const pile = $('#history-pile');
      pile.innerHTML = '';
      $('#history-label').textContent = `ইতিহাস (${GS.history.length})`;
      
      const visible = GS.history.slice(-5);
      visible.forEach((card, i) => {
        const cardEl = createCardEl(card, 'small');
        cardEl.classList.add('history-card');
        cardEl.style.left = `${i * 2}px`;
        cardEl.style.top = `${-i * 2}px`;
        cardEl.style.zIndex = i;
        pile.appendChild(cardEl);
      });
    }
    
    function renderHand() {
      const handContainer = $('#player-hand');
      handContainer.innerHTML = '';
      
      const player = GS.players[0];
      const hand = player.hand;
      const n = hand.length;
      
      if (n === 0) return;
      
      const handW = handContainer.clientWidth || 800;
      const cardW = 72;
      const maxSpread = Math.min(handW - cardW - 20, n * cardW * 0.6);
      const spacing = n > 1 ? maxSpread / (n - 1) : 0;
      const startX = (handW - maxSpread - cardW) / 2;
      
      hand.forEach((card, i) => {
        const cardEl = createCardEl(card);
        cardEl.classList.add('card-in-hand');
        
        const centerOffset = i - (n - 1) / 2;
        const rotation = centerOffset * 3;
        const yOffset = Math.abs(centerOffset) * 4;
        
        cardEl.style.left = `${startX + i * spacing}px`;
        cardEl.style.top = `${yOffset}px`;
        cardEl.style.transform = `rotate(${rotation}deg)`;
        cardEl.style.zIndex = i;
        
        cardEl.addEventListener('click', () => onCardClick(i));
        cardEl.addEventListener('dblclick', () => showCardDetail(card));
        
        handContainer.appendChild(cardEl);
      });
      
      // Highlight playable cards
      highlightPlayable();
    }
    
    function highlightPlayable() {
      const handContainer = $('#player-hand');
      const cards = handContainer.querySelectorAll('.card');
      
      cards.forEach(cardEl => {
        const cardId = parseInt(cardEl.dataset.cardId);
        const card = RupantorApp.data.cards.find(c => c.id === cardId);
        
        if (card && canPlay(card, GS.worldState)) {
          cardEl.classList.add('playable');
        } else {
          cardEl.classList.remove('playable');
        }
      });
    }
    
    function renderStats() {
      $('#player-score').textContent = GS.players[0].score;
      $('#ai-score').textContent = GS.players[1].score;
      $('#moves').textContent = GS.moves;
    }
    
    function renderMission() {
      const mission = GS.players[0].mission;
      if (mission) {
        $('#player-mission-text').textContent = `${mission.n}: ${mission.o}`;
        const progress = mission.progress || 0;
        const target = mission.target || mission.val || 1;
        const pct = Math.min(100, (progress / target) * 100);
        $('#player-mission-bar').style.width = `${pct}%`;
      }
    }
    
    function updateTurnIndicator() {
      const ind = $('#turn-indicator');
      if (GS.current === 0) {
        ind.className = 'turn-indicator player';
        ind.textContent = 'Your Turn';
      } else {
        ind.className = 'turn-indicator ai';
        ind.textContent = 'AI Thinking...';
      }
    }
    
    // Game Actions
    function onCardClick(handIdx) {
      if (GS.paused || GS.current !== 0) return;
      
      const player = GS.players[0];
      const card = player.hand[handIdx];
      
      if (!canPlay(card, GS.worldState)) {
        showToast('Cannot play this card!', 'error');
        return;
      }
      
      saveState();
      
      // Play card
      player.hand.splice(handIdx, 0);
      GS.history.push(GS.worldState);
      GS.worldState = card;
      GS.moves++;
      
      // Calculate points
      const points = CHAIN_POINTS[1] || 1;
      player.score += points;
      
      // Check mission progress
      checkMissionProgress(player);
      
      // Update UI
      renderHand();
      renderWorldState();
      renderHistory();
      renderStats();
      renderMission();
      
      // Check win
      if (checkWin()) return;
      
      // Pass turn
      GS.current = 1;
      updateTurnIndicator();
      
      setTimeout(aiTurn, 1000);
    }
    
    function clickDeck() {
      if (GS.paused || GS.current !== 0) return;
      
      const player = GS.players[0];
      if (player.hand.length >= MAX_HAND) {
        showToast('Hand is full! Must play a card.', 'warning');
        return;
      }
      
      const card = safeDraw(0);
      if (!card) {
        showToast('No cards left!', 'error');
        return;
      }
      
      saveState();
      player.hand.push(card);
      renderHand();
      renderDeck();
      
      // Auto-pass if must
      if (player.hand.length >= MAX_HAND && !hasPlayableCard(player)) {
        showToast('No playable cards - passing turn', 'info');
        passTurn();
      }
    }
    
    function hasPlayableCard(player) {
      return player.hand.some(c => canPlay(c, GS.worldState));
    }
    
    function passTurn() {
      if (GS.paused) return;
      saveState();
      GS.current = GS.current === 0 ? 1 : 0;
      GS.turn++;
      updateTurnIndicator();
      
      if (GS.current === 1) {
        setTimeout(aiTurn, 1000);
      }
    }
    
    // AI Logic
    function aiTurn() {
      if (GS.paused || GS.phase !== 'playing') return;
      
      const ai = GS.players[1];
      
      // Draw card
      if (ai.hand.length < MAX_HAND) {
        const card = safeDraw(1);
        if (card) ai.hand.push(card);
      }
      
      // Find playable cards
      const playable = ai.hand.filter(c => canPlay(c, GS.worldState));
      
      if (playable.length === 0) {
        // Pass
        GS.current = 0;
        GS.turn++;
        updateTurnIndicator();
        renderDeck();
        return;
      }
      
      // Pick best card (prefer same category as world state for pure chain)
      const wsCat = GS.worldState.c;
      let chosen = playable.find(c => c.c === wsCat) || playable[0];
      
      // Play card
      const idx = ai.hand.indexOf(chosen);
      ai.hand.splice(idx, 1);
      GS.history.push(GS.worldState);
      GS.worldState = chosen;
      GS.moves++;
      
      // Points
      const points = CHAIN_POINTS[1] || 1;
      ai.score += points;
      
      // Check mission
      checkMissionProgress(ai);
      
      // Update UI
      renderDeck();
      renderWorldState();
      renderHistory();
      renderStats();
      
      // Check win
      if (checkWin()) return;
      
      // Pass turn back
      GS.current = 0;
      GS.turn++;
      updateTurnIndicator();
    }
    
    // Mission System
    function checkMissionProgress(player) {
      const mission = player.mission;
      if (!mission) return;
      
      switch (mission.t) {
        case 'reach':
          if (GS.worldState.id === mission.target) {
            mission.progress = mission.target;
            player.score += mission.p;
            showToast(`Mission Complete: ${mission.n}!`, 'success');
          }
          break;
        case 'chain':
          // Simplified
          break;
        case 'playCat':
          player.playedCats = player.playedCats || {};
          player.playedCats[mission.cat] = (player.playedCats[mission.cat] || 0) + 1;
          if (player.playedCats[mission.cat] >= mission.val) {
            player.score += mission.p;
            showToast(`Mission Complete: ${mission.n}!`, 'success');
          }
          break;
      }
    }
    
    // Win Condition
    function checkWin() {
      const p0 = GS.players[0];
      const p1 = GS.players[1];
      
      if (p0.score >= WIN_SCORE) {
        endGame('player');
        return true;
      }
      if (p1.score >= WIN_SCORE) {
        endGame('ai');
        return true;
      }
      
      // Deck exhausted
      if (GS.deck.length === 0 && GS.history.length === 0) {
        if (p0.score > p1.score) {
          endGame('player');
        } else if (p1.score > p0.score) {
          endGame('ai');
        } else {
          endGame('draw');
        }
        return true;
      }
      
      return false;
    }
    
    function endGame(winner) {
      GS.phase = 'ended';
      clearInterval(GS.timerInt);
      
      const modal = $('#gameover-modal');
      const title = $('#gameover-title');
      const body = $('#gameover-body');
      
      if (winner === 'player') {
        title.textContent = '🎉 You Win!';
        launchConfetti();
      } else if (winner === 'ai') {
        title.textContent = '🤖 AI Wins';
      } else {
        title.textContent = "🤝 It's a Draw";
      }
      
      const elapsed = Math.floor((Date.now() - GS.startTime) / 1000);
      
      body.innerHTML = `
        <div style="text-align:center;margin-bottom:1.5rem;">
          <p style="font-size:1.2rem;margin-bottom:0.5rem;">Final Score</p>
          <p>You: <strong style="color:var(--amber)">${p0.score}</strong> | AI: <strong>${p1.score}</strong></p>
          <p style="margin-top:1rem;color:var(--muted)">Time: ${formatTime(elapsed)} | Moves: ${GS.moves}</p>
        </div>
        <div style="display:flex;gap:0.5rem;justify-content:center;">
          <button class="btn-primary" onclick="startNewGame()">Play Again</button>
          <button class="btn-secondary" onclick="location.href='index.html'">Home</button>
        </div>
      `;
      
      showModal('gameover-modal');
      
      // Save stats
      saveStats(winner);
    }
    
    // Save/Load System
    function saveState() {
      if (GS.undoStack.length >= MAX_UNDO) {
        GS.undoStack.shift();
      }
      GS.undoStack.push(JSON.stringify({
        deck: GS.deck,
        history: GS.history,
        worldState: GS.worldState,
        players: GS.players,
        current: GS.current,
        turn: GS.turn,
        moves: GS.moves
      }));
    }
    
    function undo() {
      if (GS.undoStack.length === 0 || GS.paused || GS.current !== 0) return;
      
      const state = JSON.parse(GS.undoStack.pop());
      GS.deck = state.deck;
      GS.history = state.history;
      GS.worldState = state.worldState;
      GS.players = state.players;
      GS.current = state.current;
      GS.turn = state.turn;
      GS.moves = state.moves;
      
      renderAll();
      showToast('Undone!', 'info');
    }
    
    function saveStats(winner) {
      const stats = JSON.parse(localStorage.getItem('rupantor_stats') || '{"games":0,"wins":0,"bestScore":0}');
      stats.games++;
      if (winner === 'player') stats.wins++;
      stats.bestScore = Math.max(stats.bestScore, GS.players[0].score);
      localStorage.setItem('rupantor_stats', JSON.stringify(stats));
    }
    
    function loadHeader() {
      fetch('components/header.html')
        .then(r => r.text())
        .then(html => {
          $('#header').innerHTML = html;
        })
        .catch(err => {
          console.error('Header load failed:', err);
          // Fallback inline header
          $('#header').innerHTML = `
            <nav class="navbar glass">
              <div class="nav-brand">
                <a href="index.html" class="logo-link">
                  <div class="logo-circle">রূ</div>
                </a>
                <a href="index.html" class="brand-title">RUPANTOR</a>
              </div>
              <ul class="nav-links" style="display:flex;">
                <li><a href="index.html">হোম</a></li>
                <li><a href="tutorial.html">টিউটোরিয়াল</a></li>
                <li><a href="play.html" class="active">খেলুন</a></li>
                <li><a href="cards.html">কার্ড</a></li>
                <li><a href="rulebook.html">নিয়ম</a></li>
                <li><a href="about.html">পরিচিতি</a></li>
                <li><a href="settings.html">সেটিংস</a></li>
              </ul>
            </nav>
          `;
        });
    }
    
    // Show/Hide functions
    function showModal(id) { document.getElementById(id).classList.add('active'); document.body.style.overflow = 'hidden'; }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); document.body.style.overflow = ''; }
    function showToast(msg, type='info') {
      const container = $('#toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideInRight 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    function launchConfetti() {
      const colors = ['#D4A84B','#2E7D5B','#4A90A4','#C97B3C','#6EC6E6'];
      const container = $('#confetti-container');
      for (let i = 0; i < 50; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti';
        conf.style.left = `${Math.random()*100}%`;
        conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        conf.style.animationDelay = `${Math.random()*2}s`;
        container.appendChild(conf);
      }
      setTimeout(() => container.innerHTML = '', 5000);
    }
    function showCardDetail(card) {
      const body = $('#card-detail-body');
      body.innerHTML = '';
      const cardEl = createCardEl(card, 'large');
      body.appendChild(cardEl);
      showModal('card-detail-modal');
    }
    
    // Timer
    function startTimer() {
      GS.startTime = Date.now();
      GS.timerInt = setInterval(() => {
        if (!GS.paused) {
          const elapsed = Math.floor((Date.now() - GS.startTime) / 1000);
          $('#timer').textContent = formatTime(elapsed);
        }
      }, 1000);
    }
    
    // Render All
    function renderAll() {
      renderDeck();
      renderWorldState();
      renderHistory();
      renderHand();
      renderStats();
      renderMission();
      updateTurnIndicator();
    }
    
    // Start New Game
    function startNewGame() {
      // Initialize deck (exclude reaction cards for simplicity)
      const allCards = RupantorApp.data.cards.filter(c => !c.isReact);
      GS.deck = shuffle(allCards);
      GS.history = [];
      
      // Starting world state
      const startCards = allCards.filter(c => c.isStart);
      GS.worldState = startCards[Math.floor(Math.random() * startCards.length)];
      
      // Players
      GS.players = [
        { hand: [], score: 0, mission: getRandomMission() },
        { hand: [], score: 0, mission: getRandomMission() }
      ];
      
      // Deal starting hands
      for (let i = 0; i < 5; i++) {
        GS.players[0].hand.push(safeDraw(0));
        GS.players[1].hand.push(safeDraw(1));
      }
      
      // Reset state
      GS.current = 0;
      GS.turn = 1;
      GS.moves = 0;
      GS.phase = 'playing';
      GS.paused = false;
      GS.undoStack = [];
      
      // Clear timer
      if (GS.timerInt) clearInterval(GS.timerInt);
      
      // Render
      closeModal('gameover-modal');
      renderAll();
      startTimer();
      
      showToast('New game started!', 'success');
    }
    
    function getRandomMission() {
      const missions = RupantorApp.data.missions;
      return missions ? missions[Math.floor(Math.random() * missions.length)] : null;
    }
    
    // Event Listeners
    function setupEvents() {
      $('#deck-zone').addEventListener('click', clickDeck);
      $('#btn-new').addEventListener('click', () => {
        if (confirm('Start new game?')) startNewGame();
      });
      $('#btn-undo').addEventListener('click', undo);
      $('#btn-hint').addEventListener('click', showHint);
      $('#btn-pause').addEventListener('click', togglePause);
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') showHint();
        if (e.key === 'p' || e.key === 'P') togglePause();
        if (e.ctrlKey && e.key === 'z') undo();
        if (e.key === 'Escape') closeModal('pause-modal');
      });
      
      window.addEventListener('resize', debounce(renderHand, 150));
    }
    
    function showHint() {
      if (GS.current !== 0) return;
      const player = GS.players[0];
      const playable = player.hand.filter(c => canPlay(c, GS.worldState));
      if (playable.length > 0) {
        const hintCard = playable[0];
        const cardEl = $(`.card-in-hand[data-card-id="${hintCard.id}"]`);
        if (cardEl) {
          cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          cardEl.classList.add('animate-glow');
          setTimeout(() => cardEl.classList.remove('animate-glow'), 2000);
        }
        showToast(`Play: ${hintCard.n}`, 'info');
      } else {
        showToast('No playable cards - draw or pass', 'warning');
      }
    }
    
    function togglePause() {
      GS.paused = !GS.paused;
      if (GS.paused) {
        showModal('pause-modal');
      } else {
        closeModal('pause-modal');
      }
    }
    
    function debounce(fn, ms) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), ms);
      };
    }
    
    // Initialize
    function init() {
      loadHeader();
      setupEvents();
      
      // Wait for data to load
      const checkReady = setInterval(() => {
        if (RupantorApp.loaded && RupantorApp.data.cards.length > 0) {
          clearInterval(checkReady);
          startNewGame();
        }
      }, 100);
    }
    
    // Start when DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
