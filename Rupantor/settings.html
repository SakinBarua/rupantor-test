<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - RUPANTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animation.css">
</head>
<body>
  <header id="header"></header>
  
  <main>
    <div class="container" style="padding-top:2rem;max-width:700px;">
      <h1 class="text-center text-amber mb-2">Settings</h1>
      <p class="text-center text-muted bengali mb-3">সেটিংস</p>
      
      <!-- Sound Settings -->
      <div class="glass-panel mb-3">
        <h2 class="text-emerald mb-2">Sound</h2>
        <label style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;cursor:pointer;">
          <input type="checkbox" id="soundToggle" checked onchange="SettingsUI.set('sound',this.checked)" style="width:20px;height:20px;">
          <span>Enable Sound Effects</span>
        </label>
        <label style="display:block;margin-bottom:1rem;">
          <span style="display:block;margin-bottom:0.5rem;color:var(--muted);">Volume: <span id="volumeValue">70</span>%</span>
          <input type="range" id="volumeSlider" min="0" max="100" value="70" 
            oninput="document.getElementById('volumeValue').textContent=this.value;SettingsUI.set('volume',this.value/100)"
            style="width:100%;accent-color:var(--emerald);">
        </label>
      </div>
      
      <!-- Visual Settings -->
      <div class="glass-panel mb-3">
        <h2 class="text-emerald mb-2">Visual</h2>
        <label style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;">
          <input type="checkbox" id="animToggle" checked onchange="SettingsUI.set('animations',this.checked)" style="width:20px;height:20px;">
          <span>Enable Animations</span>
        </label>
      </div>
      
      <!-- Statistics -->
      <div class="glass-panel mb-3">
        <h2 class="text-emerald mb-2">Statistics</h2>
        <div id="statsDisplay" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;">
          <div>
            <div style="color:var(--muted);font-size:0.85rem;">Games Played</div>
            <div id="statGames" style="font-size:1.5rem;font-weight:700;color:var(--ivory);">0</div>
          </div>
          <div>
            <div style="color:var(--muted);font-size:0.85rem;">Wins</div>
            <div id="statWins" style="font-size:1.5rem;font-weight:700;color:var(--success);">0</div>
          </div>
          <div>
            <div style="color:var(--muted);font-size:0.85rem;">Win Rate</div>
            <div id="statRate" style="font-size:1.5rem;font-weight:700;color:var(--amber);">0%</div>
          </div>
          <div>
            <div style="color:var(--muted);font-size:0.85rem;">Best Score</div>
            <div id="statBest" style="font-size:1.5rem;font-weight:700;color:var(--gold);">0</div>
          </div>
        </div>
        <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.1);">
          <div style="color:var(--muted);font-size:0.85rem;">Best Time</div>
          <div id="statTime" style="font-size:1.2rem;font-weight:700;color:var(--cyan);">--:--</div>
        </div>
      </div>
      
      <!-- Data Management -->
      <div class="glass-panel mb-3">
        <h2 class="text-emerald mb-2">Data</h2>
        <button onclick="SettingsUI.resetStats()" style="width:100%;margin-bottom:0.5rem;background:var(--terracotta);">Reset Statistics</button>
        <button onclick="SettingsUI.resetAll()" style="width:100%;background:var(--danger);">Reset All Data</button>
      </div>
    </div>
  </main>
  
  <script src="js/ui.js"></script>
  <script src="js/save.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/app.js"></script>
  <script>
const SettingsUI = {
  init() {
    const settings = Save.getSettings();
    document.getElementById('soundToggle').checked = settings.sound;
    document.getElementById('animToggle').checked = settings.animations;
    document.getElementById('volumeSlider').value = settings.volume * 100;
    document.getElementById('volumeValue').textContent = Math.round(settings.volume * 100);
    
    Audio.init();
    Audio.setEnabled(settings.sound);
    Audio.setVolume(settings.volume);
    Animation.setEnabled(settings.animations);
    
    this.loadStats();
  },
  
  set(key, value) {
    if (key === 'sound') Audio.setEnabled(value);
    if (key === 'volume') Audio.setVolume(value);
    if (key === 'animations') Animation.setEnabled(value);
    Save.saveSettings({ ...Save.getSettings(), [key]: value });
  },
  
  loadStats() {
    const stats = Save.getStats();
    document.getElementById('statGames').textContent = stats.games;
    document.getElementById('statWins').textContent = stats.wins;
    document.getElementById('statRate').textContent = stats.winRate + '%';
    document.getElementById('statBest').textContent = stats.bestScore;
    document.getElementById('statTime').textContent = stats.bestTime ? 
      Math.floor(stats.bestTime / 60) + ':' + String(stats.bestTime % 60).padStart(2, '0') : '--:--';
  },
  
  resetStats() {
    if (confirm('Reset all statistics?')) {
      localStorage.removeItem(Save.KEY_STATS);
      this.loadStats();
    }
  },
  
  resetAll() {
    if (confirm('Reset ALL data including settings and tutorial progress? This cannot be undone!')) {
      Save.resetAll();
      location.reload();
    }
  }
};

document.addEventListener('DOMContentLoaded', () => SettingsUI.init());
  </script>
</body>
</html>
