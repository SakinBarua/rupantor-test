  <div class="nav-brand">

      <div class="logo-circle">রূ</div>
    </a>
    <a href="index.html" class="brand-title">RUPANTOR</a>
  </div>
  
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>
  
  <ul class="nav-links">
    <li><a href="index.html" data-page="home">হোম</a></li>
    <li><a href="tutorial.html" data-page="tutorial">টিউটোরিয়াল</a></li>
    <li><a href="play.html" data-page="play">খেলুন</a></li>
    <li><a href="cards.html" data-page="cards">কার্ড</a></li>
    <li><a href="rulebook.html" data-page="rules">নিয়ম</a></li>
    <li><a href="about.html" data-page="about">পরিচিতি</a></li>
    <li><a href="settings.html" data-page="settings">সেটিংস</a></li>
  </ul>
</nav>

<script>
(function() {
  const toggle = document.querySelector('.nav-toggle');
  const links = document.querySelector('.nav-links');
  
  if (toggle && links) {
    toggle.addEventListener('click', () => {
      const expanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', !expanded);
      links.classList.toggle('active');
      toggle.classList.toggle('active');
    });
    
    // Highlight active page
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    const pageMap = {
      'index.html': 'home',
      'tutorial.html': 'tutorial',
      'play.html': 'play',
      'cards.html': 'cards',
      'rulebook.html': 'rules',
      'about.html': 'about',
      'settings.html': 'settings'
    };
    const activePage = pageMap[currentPage];
    if (activePage) {
      const activeLink = document.querySelector(`.nav-links a[data-page="${activePage}"]`);
      if (activeLink) activeLink.classList.add('active');
    }
  }
})();
</script>
