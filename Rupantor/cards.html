<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards - RUPANTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <header id="header"></header>
  
  <main>
    <div class="container" style="padding-top:2rem;">
      <h1 class="text-center text-amber mb-2">Card Library</h1>
      <p class="text-center text-muted bengali mb-3">108টি অনন্য কার্ড</p>
      
      <!-- Search & Filter -->
      <div class="glass-panel mb-3">
        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;">
          <input type="text" id="searchInput" placeholder="Search cards..." 
            style="flex:1;min-width:200px;padding:0.5rem 1rem;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.1);background:var(--navy);color:var(--ivory);"
            oninput="CardsUI.search(this.value)">
          
          <select id="filterSelect" onchange="CardsUI.filter(this.value)"
            style="padding:0.5rem 1rem;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.1);background:var(--navy);color:var(--ivory);">
            <option value="">All Categories</option>
            <option value="Nature">🌿 Nature</option>
            <option value="Weather">☁️ Weather</option>
            <option value="Energy">☀️ Energy</option>
            <option value="Water">💧 Water</option>
            <option value="Earth">⛰️ Earth</option>
            <option value="Plants">🌱 Plants</option>
            <option value="Animals">🦋 Animals</option>
            <option value="Objects">🌂 Objects</option>
            <option value="Reaction">↻ Reaction</option>
            <option value="Mission">🎯 Mission</option>
            <option value="World">🌍 World</option>
            <option value="Special">✦ Special</option>
          </select>
        </div>
        
        <div id="resultCount" class="mt-2 text-muted" style="font-size:0.85rem;"></div>
      </div>
      
      <!-- Card Grid -->
      <div id="cardGrid" class="card-grid"></div>
    </div>
  </main>
  
  <script src="js/cards.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
const CardsUI = {
  allCards: [],
  
  async init() {
    await Cards.load();
    this.allCards = Cards.data;
    this.render(this.allCards);
  },
  
  render(cards) {
    const grid = document.getElementById('cardGrid');
    const count = document.getElementById('resultCount');
    
    if (!grid) return;
    
    grid.innerHTML = cards.map(c => `
      <div onclick="UI.showCardDetail(${c.id})" style="cursor:pointer">
        ${UI.cardHTML(c)}
      </div>
    `).join('');
    
    if (count) count.textContent = `${cards.length} cards shown`;
  },
  
  search(query) {
    const filtered = Cards.search(query);
    this.render(filtered);
  },
  
  filter(category) {
    const filtered = category ? Cards.getByCategory(category) : this.allCards;
    this.render(filtered);
  }
};

document.addEventListener('DOMContentLoaded', () => CardsUI.init());
  </script>
</body>
</html>
